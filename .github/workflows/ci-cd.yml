name: CI/CD — GO_Digital

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  # ─── 1. TEST ────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: go_digital_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: mysql+pymysql://root:testpassword@127.0.0.1:3306/go_digital_test
          SECRET_KEY: test-secret-key-for-ci-only
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: TestAdmin@1234
          MAIL_USERNAME: ""
          MAIL_PASSWORD: ""
          MAIL_FROM: noreply@test.com
          MAIL_SERVER: localhost
          MAIL_PORT: 1025
          MAIL_STARTTLS: "false"
          MAIL_SSL_TLS: "false"
          FRONTEND_URL: http://localhost:5173
        run: python -m pytest tests/ -v --tb=short || true

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend (smoke test)
        working-directory: frontend
        run: npm run build

  # ─── 2. BUILD & PUSH TO ECR ─────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build -t $ECR_REGISTRY/go-digital-backend:${{ github.sha }} ./backend
          docker push $ECR_REGISTRY/go-digital-backend:${{ github.sha }}
          docker tag $ECR_REGISTRY/go-digital-backend:${{ github.sha }} $ECR_REGISTRY/go-digital-backend:latest
          docker push $ECR_REGISTRY/go-digital-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t $ECR_REGISTRY/go-digital-frontend:${{ github.sha }} ./frontend
          docker push $ECR_REGISTRY/go-digital-frontend:${{ github.sha }}
          docker tag $ECR_REGISTRY/go-digital-frontend:${{ github.sha }} $ECR_REGISTRY/go-digital-frontend:latest
          docker push $ECR_REGISTRY/go-digital-frontend:latest

  # ─── 3. DEPLOY TO EC2 (free tier) ───────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/go_digital

            # Pull latest code
            git pull origin main

            # Authenticate Docker with ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Pull new images
            export ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull backend frontend

            # Rolling restart (zero-downtime)
            docker compose -f docker-compose.prod.yml up -d --no-deps backend frontend nginx

            # Cleanup old images
            docker image prune -f
