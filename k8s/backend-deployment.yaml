apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: go-digital
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: PLACEHOLDER_ECR/go-digital-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: go-digital-secrets
            - configMapRef:
                name: go-digital-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: go-digital
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
