apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: go-digital
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: PLACEHOLDER_ECR/go-digital-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: go-digital
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
